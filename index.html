<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>おうちクン</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #FAFAF8; font-family: sans-serif; padding: 20px 15px; }
    .task-card { background: #fff; padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .btn { border: none; padding: 8px 15px; border-radius: 8px; color: #fff; fontWeight: bold; cursor: pointer; }
    .btn-a { background: #FF6B6B; }
    .btn-b { background: #4ECDC4; }
    .progress-bar { background: #eee; height: 20px; border-radius: 10px; overflow: hidden; display: flex; margin: 20px 0; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const GAS_URL = "https://script.google.com/macros/s/AKfycbwwxyfxoqMAOoe3XZ-UAV2HJuPB9dq2-ALQNQuH8sX8I851wwGlFlqyCZvtx4vleZP_jg/exec";

const INITIAL_TASKS = [
  { id: 1, name: "料理", weight: 3, icon: "🍳" },
  { id: 2, name: "掃除", weight: 2, icon: "🧹" },
  { id: 3, name: "洗濯", weight: 2, icon: "👕" },
  { id: 4, name: "買い物", weight: 2, icon: "🛒" },
  { id: 5, name: "食器洗い", weight: 1, icon: "🍽️" }
];

function App() {
  const [tasks, setTasks] = useState(INITIAL_TASKS);
  const [logs, setLogs] = useState([]);
  const [names, setNames] = useState({ A: "パートナーA", B: "パートナーB" });
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    fetch(GAS_URL)
      .then(res => res.json())
      .then(data => {
        if (data.tasks) setTasks(data.tasks);
        if (data.logs) setLogs(data.logs);
        if (data.names) {
          const nObj = {};
          data.names.forEach(n => nObj[n.id] = n.name);
          setNames(nObj);
        }
        setLoaded(true);
      })
      .catch(() => setLoaded(true));
  }, []);

  const logTask = (taskId, person) => {
    const task = tasks.find(t => t.id === taskId);
    const newLog = { taskId, person, time: Date.now(), weight: Number(task.weight) };
    
    fetch(GAS_URL, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify({ action: "addLog", target: "logs", data: newLog })
    }).then(() => {
      setLogs(prev => [...prev, newLog]);
    });
  };

  const stats = (p) => {
    const pl = logs.filter(l => l.person === p);
    return pl.reduce((s, l) => s + Number(l.weight), 0);
  };

  if (!loaded) return <div>読み込み中...</div>;

  const sA = stats("A");
  const sB = stats("B");
  const ratioA = (sA + sB) === 0 ? 50 : (sA / (sA + sB)) * 100;

  return (
    <div style={{ maxWidth: 500, margin: "0 auto" }}>
      <h1 style={{ textAlign: "center" }}>🏠 おうちクン</h1>
      
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginTop: 20 }}>
        <div style={{ background: "#FFE5E5", padding: 10, borderRadius: 10 }}>
          <div style={{ fontWeight: "bold", color: "#CC4444" }}>{names.A}</div>
          <div style={{ fontSize: 24 }}>{sA}pt</div>
        </div>
        <div style={{ background: "#E0F7F5", padding: 10, borderRadius: 10 }}>
          <div style={{ fontWeight: "bold", color: "#2EA89F" }}>{names.B}</div>
          <div style={{ fontSize: 24 }}>{sB}pt</div>
        </div>
      </div>

      <div className="progress-bar">
        <div style={{ width: ratioA + "%", background: "#FF6B6B" }} />
        <div style={{ width: (100 - ratioA) + "%", background: "#4ECDC4" }} />
      </div>

      <div style={{ marginTop: 20 }}>
        {tasks.map(t => (
          <div key={t.id} className="task-card">
            <span style={{ fontSize: 24 }}>{t.icon}</span>
            <span style={{ flex: 1, fontWeight: "bold" }}>{t.name}</span>
            <button className="btn btn-a" onClick={() => logTask(t.id, "A")}>A</button>
            <button className="btn btn-b" onClick={() => logTask(t.id, "B")}>B</button>
          </div>
        ))}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
