<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>おうちクン v3.1</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    :root {
      --bg-color: #F8F9FB;
      --card-bg: #FFFFFF;
      --text-main: #444444;
      --text-sub: #A0A0A0;
      --color-a: #FF7F7F;
      --color-b: #64D2C8;
      --color-a-light: #FFF2F2;
      --color-b-light: #E0FAF8;
      --shadow: 0 4px 10px rgba(0,0,0,0.03);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg-color); font-family: -apple-system, sans-serif; color: var(--text-main); font-size: 14px; height: 100vh; display: flex; flex-direction: column; }
    
    .main-content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; }
    .card { background: var(--card-bg); padding: 12px; border-radius: 16px; box-shadow: var(--shadow); margin-bottom: 12px; }
    .title { text-align: center; font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #555; }
    .btn { border: none; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 13px; }
    
    /* スコア表示 */
    .score-container { display: flex; gap: 10px; margin-bottom: 12px; }
    .score-card { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 12px; border-radius: 16px; }
    .score-card.a { background: var(--color-a-light); }
    .score-card.b { background: var(--color-b-light); }
    .score-pfp { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 2px solid #fff; margin-bottom: 4px; }
    .score-points { font-size: 24px; font-weight: 900; }
    
    /* プログレスバー */
    .progress-container { background: #e0e0e0; height: 6px; border-radius: 3px; overflow: hidden; margin-bottom: 20px; display: flex; }
    
    /* 家事リストUI */
    .task-card { display: flex; align-items: center; padding: 8px 12px; gap: 10px; }
    .task-icon { font-size: 20px; width: 25px; text-align: center; }
    .task-info { flex: 1; }
    .task-name { font-weight: bold; font-size: 13px; }
    .task-weight { font-size: 10px; color: var(--text-sub); }
    .btn-log { min-width: 38px; padding: 6px; color: white; }

    /* 履歴リスト */
    .log-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f5f5f5; font-size: 12px; }
    .log-time { font-size: 10px; color: var(--text-sub); }
    .btn-del { color: #ff4d4f; background: none; border: none; font-size: 16px; padding: 5px; }

    /* ナビゲーション */
    .nav-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: #fff; display: flex; border-top: 1px solid #eee; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sub); font-size: 10px; }
    .nav-item.active { color: #555; font-weight: bold; }
    .nav-icon { font-size: 20px; margin-bottom: 2px; }

    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 1000; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw1pkuwQ3jtT7AUobbjuXVueSSY8MRcQQO6snoZ-7-38WAQrxawoRE1aPKlDluOgO2XRQ/exec";

    function App() {
      const [data, setData] = useState({ tasks: [], logs: [], names: { A: "天誠", B: "彩香" } });
      const [pfps, setPfps] = useState({ A: localStorage.getItem("pfp_A") || "", B: localStorage.getItem("pfp_B") || "" });
      const [view, setView] = useState("home");
      const [loaded, setLoaded] = useState(false);
      const [editing, setEditing] = useState(null);

      const load = () => {
        fetch(GAS_URL).then(r => r.json()).then(d => {
          const names = { A: "A", B: "B" };
          if (d.names) d.names.forEach(n => { if(n.id == 1) names.A = n.name; if(n.id == 2) names.B = n.name; });
          setData({ tasks: d.tasks || [], logs: d.logs || [], names });
          setLoaded(true);
        });
      };
      useEffect(() => { load(); }, []);

      const action = (act, pay) => {
        fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: act, ...pay }) })
          .then(() => { if(act !== 'addLog') load(); });
      };

      const logTask = (tid, p) => {
        const t = data.tasks.find(x => x.id == tid);
        const newL = { taskId: tid, person: p, weight: Number(t.weight), time: Date.now() };
        setData(prev => ({ ...prev, logs: [newL, ...prev.logs] }));
        action("addLog", { data: newL });
      };

      const pA = useMemo(() => data.logs.filter(l => l.person === "A").reduce((s, l) => s + Number(l.weight), 0), [data.logs]);
      const pB = useMemo(() => data.logs.filter(l => l.person === "B").reduce((s, l) => s + Number(l.weight), 0), [data.logs]);
      const ratioA = (pA + pB) === 0 ? 50 : (pA / (pA + pB)) * 100;

      if (!loaded) return <div style={{textAlign:'center', padding:'50px', color:'#999'}}>読み込み中...</div>;

      return (
        <div style={{display:'flex', flexDirection:'column', height:'100%'}}>
          <div className="main-content">
            {view === "home" && (
              <>
                <div className="score-container">
                  <div className="score-card a"><img src={pfps.A} className="score-pfp" /><b>{data.names.A}</b><div className="score-points">{pA}</div></div>
                  <div className="score-card b"><img src={pfps.B} className="score-pfp" /><b>{data.names.B}</b><div className="score-points">{pB}</div></div>
                </div>
                <div className="progress-container">
                  <div style={{width: ratioA+'%', background:'var(--color-a)'}} />
                  <div style={{width: (100-ratioA)+'%', background:'var(--color-b)'}} />
                </div>
                {data.tasks.map(t => (
                  <div key={t.id} className="card task-card">
                    <div className="task-icon">{t.icon}</div>
                    <div className="task-info"><div className="task-name">{t.name}</div><div className="task-weight">{t.weight}pt</div></div>
                    <button className="btn btn-log" style={{background:'var(--color-a)'}} onClick={()=>logTask(t.id,"A")}>{data.names.A[0]}</button>
                    <button className="btn btn-log" style={{background:'var(--color-b)'}} onClick={()=>logTask(t.id,"B")}>{data.names.B[0]}</button>
                  </div>
                ))}
              </>
            )}

            {view === "history" && (
              <div className="card">
                <div className="title">📜 最近の履歴</div>
                {data.logs.slice(0, 50).map((l, i) => {
                  const t = data.tasks.find(x => x.id == l.taskId) || {name:'不明', icon:'❓'};
                  return (
                    <div key={i} className="log-item">
                      <div>
                        <b style={{color: l.person==='A'?'var(--color-a)':'var(--color-b)'}}>{data.names[l.person]}</b> {t.icon} {t.name} (+{l.weight})
                        <div className="log-time">{new Date(l.time).toLocaleString()}</div>
                      </div>
                      <button className="btn-del" onClick={()=>{if(confirm('削除しますか？')) action('deleteLog',{time:l.time})}}>🗑️</button>
                    </div>
                  );
                })}
              </div>
            )}

            {view === "settings" && (
              <>
                <div className="card">
                  <div className="title">👤 プロフィール</div>
                  <input className="form-input" style={{width:'100%', padding:10, marginBottom:10}} value={pfps.A} onChange={e=>{setPfps({...pfps,A:e.target.value}); localStorage.setItem("pfp_A",e.target.value)}} placeholder="天誠 画像URL" />
                  <input className="form-input" style={{width:'100%', padding:10}} value={pfps.B} onChange={e=>{setPfps({...pfps,B:e.target.value}); localStorage.setItem("pfp_B",e.target.value)}} placeholder="彩香 画像URL" />
                </div>
                <div className="card">
                  <div className="title">家事の管理</div>
                  {data.tasks.map(t => (
                    <div key={t.id} style={{display:'flex', justifyContent:'space-between', padding:'8px 0', borderBottom:'1px solid #eee'}}>
                      <span>{t.icon} {t.name} ({t.weight}pt)</span>
                      <button style={{color:'red', border:'none', background:'none'}} onClick={()=>action('deleteTask',{id:t.id})}>削除</button>
                    </div>
                  ))}
                  <button className="btn" style={{width:'100%', marginTop:10, background:'#eee'}} onClick={()=>setEditing({icon:'',name:'',weight:''})}>＋追加</button>
                </div>
              </>
            )}
          </div>

          {editing && (
            <div className="modal"><div className="card" style={{width:'300px'}}>
              <div className="title">家事の追加</div>
              <input style={{width:'100%', marginBottom:10, padding:8}} placeholder="アイコン(絵文字)" value={editing.icon} onChange={e=>setEditing({...editing,icon:e.target.value})} />
              <input style={{width:'100%', marginBottom:10, padding:8}} placeholder="名前" value={editing.name} onChange={e=>setEditing({...editing,name:e.target.value})} />
              <input style={{width:'100%', marginBottom:10, padding:8}} type="number" placeholder="pt" value={editing.weight} onChange={e=>setEditing({...editing,weight:e.target.value})} />
              <button className="btn" style={{width:'100%', background:'#555', color:'#white'}} onClick={()=>{action('addTask',{data:editing}); setEditing(null)}}>保存</button>
              <button className="btn" style={{width:'100%', background:'#eee', marginTop:5}} onClick={()=>setEditing(null)}>閉じる</button>
            </div></div>
          )}

          <div className="nav-bar">
            <div className={`nav-item ${view==='home'?'active':''}`} onClick={()=>setView('home')}><div className="nav-icon">🏠</div>HOME</div>
            <div className={`nav-item ${view==='history'?'active':''}`} onClick={()=>setView('history')}><div className="nav-icon">📊</div>履歴</div>
            <div className={`nav-item ${view==='settings'?'active':''}`} onClick={()=>setView('settings')}><div className="nav-icon">⚙️</div>設定</div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
