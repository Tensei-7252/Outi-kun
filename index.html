<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>おうちクン</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #FAFAF8; font-family: sans-serif; }
    .task-btn:active { transform: scale(0.95); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const GAS_URL = "https://script.google.com/macros/s/AKfycbwwxyfxoqMAOoe3XZ-UAV2HJuPB9dq2-ALQNQuH8sX8I851wwGlFlqyCZvtx4vleZP_jg/exec";

const INITIAL_TASKS = [
  { id: 1, name: "料理", weight: 3, icon: "🍳" },
  { id: 2, name: "掃除", weight: 2, icon: "🧹" },
  { id: 3, name: "洗濯", weight: 2, icon: "👕" },
  { id: 4, name: "買い物", weight: 2, icon: "🛒" },
  { id: 5, name: "食器洗い", weight: 1, icon: "🍽️" }
];

const COLORS = {
  A: { main: "#FF6B6B", light: "#FFE5E5", dark: "#CC4444" },
  B: { main: "#4ECDC4", light: "#E0F7F5", dark: "#2EA89F" }
};

function App() {
  const [tasks, setTasks] = useState(INITIAL_TASKS);
  const [logs, setLogs] = useState([]);
  const [names, setNames] = useState({ A: "パートナーA", B: "パートナーB" });
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    fetch(GAS_URL)
      .then(res => res.json())
      .then(data => {
        if (data.tasks && data.tasks.length > 0) setTasks(data.tasks);
        if (data.logs) setLogs(data.logs);
        if (data.names) {
          const nObj = {};
          data.names.forEach(n => nObj[n.id] = n.name);
          setNames(nObj);
        }
        setLoaded(true);
      })
      .catch(() => setLoaded(true));
  }, []);

  const logTask = (taskId, person) => {
    const task = tasks.find(t => t.id === taskId);
    const newLog = { taskId, person, time: Date.now(), weight: task.weight };
    
    fetch(GAS_URL, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify({ action: "addLog", target: "logs", data: newLog })
    }).then(() => {
      setLogs(prev => [...prev, newLog]);
    });
  };

  const getStats = (p) => {
    const pl = logs.filter(l => l.person === p);
    return { 
      weight: pl.reduce((s, l) => s + Number(l.weight), 0), 
      count: pl.length 
    };
  };

  if (!loaded) return <div style={{padding:20}}>読み込み中...</div>;

  const sA = getStats("A");
  const sB = getStats("B");
  const total = sA.weight + sB.weight;
  const ratioA = total === 0 ? 50 : (sA.weight / total) * 100;

  return (
    <div style={{ padding: "20px 16px", maxWidth: 600, margin: "0 auto" }}>
      <h1 style={{ textAlign:"center", marginBottom:20 }}>🏠 おうちクン</h1>
      
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:20 }}>
        {["A","B"].map(p => (
          <div key={p} style={{ background:COLORS[p].light, padding:15, borderRadius:15 }}>
            <div style={{ fontWeight:"bold", color:COLORS[p].dark }}>{names[p]}</div>
            <div style={{ fontSize:24, fontWeight:900 }}>{getStats(p).weight}pt</div>
          </div>
        ))}
      </div>

      <div style={{ background:"#eee", height:20, borderRadius:10, overflow:"hidden", display:"flex", marginBottom:20 }}>
        <div style={{ width: ratioA + "%", background:COLORS.A.main }} />
        <div style={{ width: (100 - ratioA) + "%", background:COLORS.B.main }} />
      </div>

      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
        {tasks.map(t => (
          <div key={t.id} style={{ background:"#fff", padding:12, borderRadius:12, display:"flex", alignItems:"center", gap:10, boxShadow:"0 2px 5px rgba(0,0,0,0.05)" }}>
            <span style={{ fontSize:20 }}>{t.icon}</span>
            <span style={{ flex:1, fontWeight:"bold" }}>{t.name}</span>
            <button className="task-btn" onClick={() => logTask(t.id, "A")} style={{ background:COLORS.A.main, color:"#fff", border:"none", padding:"8px 12px", borderRadius:8, fontWeight:"bold" }}>{names.A.slice(0,2)}</button>
            <button className="task-btn" onClick={() => logTask(t.id, "B")} style={{ background:COLORS.B.main, color:"#fff", border:"none", padding:"8px 12px", borderRadius:8, fontWeight:"bold" }}>{names.B.slice(0,2)}</button>
          </div>
        ))}
      </div>
    </div>
  );
}
