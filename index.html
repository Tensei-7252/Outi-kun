<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>おうちクン v3.0</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    /* ベーススタイル - 清潔感のある配色 */
    :root {
      --bg-color: #F8F9FB;
      --card-bg: #FFFFFF;
      --text-main: #444444;
      --text-sub: #A0A0A0;
      --color-a: #FF7F7F; /* 天誠さん色 */
      --color-b: #64D2C8; /* 彩香さん色 */
      --color-a-light: #FFF2F2;
      --color-b-light: #E0FAF8;
      --shadow: 0 4px 10px rgba(0,0,0,0.03);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg-color); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: var(--text-main); font-size: 14px; overflow: hidden; height: 100vh; }
    
    /* レイアウト */
    #root { height: 100%; display: flex; flex-direction: column; }
    .main-content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 70px; } /* 下部ナビ分 */
    
    /* 共通部品 - より薄く、シンプルに */
    .card { background: var(--card-bg); padding: 12px; border-radius: 16px; box-shadow: var(--shadow); margin-bottom: 12px; }
    .title { text-align: center; font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #555; }
    .btn { border: none; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: all 0.2s; font-size: 13px; }
    .btn:active { transform: scale(0.95); opacity: 0.8; }
    
    /* 入力フォーム - 文字を小さく */
    .form-group { margin-bottom: 12px; }
    .form-label { display: block; font-size: 11px; font-weight: bold; color: var(--text-sub); margin-bottom: 4px; }
    .form-input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #eee; background: #fafafa; font-size: 13px; }
    
    /* 絵文字ピッカー調のアイコン入力 */
    .emoji-input { font-size: 24px; width: 50px; text-align: center; border: 1px solid #ddd; padding: 5px; border-radius: 8px; }

    /* --- ホーム画面 (スコア) --- */
    .score-container { display: flex; gap: 10px; margin-bottom: 12px; }
    .score-card { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 12px; border-radius: 16px; }
    .score-card.a { background: var(--color-a-light); }
    .score-card.b { background: var(--color-b-light); }
    .score-pfp { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid #fff; box-shadow: var(--shadow); margin-bottom: 6px; }
    .score-name { font-weight: bold; font-size: 12px; }
    .score-points { font-size: 28px; font-weight: 900; line-height: 1; }
    .score-p { font-size: 10px; margin-left: 2px; }
    
    /* プログレスバー - より細く */
    .progress-container { background: #e0e0e0; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 15px; }
    .progress-bar { height: 100%; transition: width 0.5s ease-out; }

    /* 家事リスト - カードを薄くし、アイコンを表示 */
    .task-card { display: flex; align-items: center; padding: 10px 15px; gap: 10px; }
    .task-icon { font-size: 22px; width: 30px; text-align: center; } /* ここでアイコン(絵文字)を確実に表示 */
    .task-info { flex: 1; }
    .task-name { font-weight: bold; font-size: 13px; }
    .task-weight { font-size: 10px; color: var(--text-sub); background: #eee; padding: 1px 4px; border-radius: 3px; }
    .task-btns { display: flex; gap: 5px; }
    .btn-log { min-width: 40px; padding: 6px; } /* ボタンを小さく */
    .btn-log.a { background: var(--color-a); color: white; }
    .btn-log.b { background: var(--color-b); color: white; }

    /* --- 設定画面 --- */
    .settings-sub { font-size: 14px; font-weight: bold; color: #666; margin-bottom: 10px; border-left: 3px solid #ccc; padding-left: 8px; }
    .pfp-editor { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .pfp-preview { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #fff; }
    
    /* タスクエディタ - シンプルなリストに */
    .task-edit-item { display: flex; align-items: center; gap: 8px; background: #f9f9f9; padding: 8px; border-radius: 8px; margin-bottom: 5px; font-size: 12px; border: 1px solid #eee; }
    .task-edit-main { flex: 1; display: flex; align-items: center; gap: 6px; }
    .task-edit-del { background: #ff4d4f; color: white; padding: 4px 8px; border-radius: 6px; font-size: 10px; }

    /* モーダル */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
    .modal-content { background: white; padding: 20px; border-radius: 16px; width: 100%; maxWidth: 350px; }

    /* --- 下部ナビゲーションバー - よりシンプルに --- */
    .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 55px; background: #fff; display: flex; border-top: 1px solid #eee; z-index: 100; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sub); font-size: 10px; }
    .nav-item.active { color: #555; }
    .nav-icon { font-size: 18px; margin-bottom: 2px; }

    /* ローディング - 文字を小さく */
    .loading-overlay { position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; font-size: 12px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- 設定 (GASのURLはそのまま) ---
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw1pkuwQ3jtT7AUobbjuXVueSSY8MRcQQO6snoZ-7-38WAQrxawoRE1aPKlDluOgO2XRQ/exec";

    function App() {
      const [data, setData] = useState({ tasks: [], logs: [], names: { A: "天誠", B: "彩香" } });
      const [pfps, setPfps] = useState({ A: localStorage.getItem("pfp_A") || "", B: localStorage.getItem("pfp_B") || "" });
      const [activeTab, setActiveTab] = useState("home");
      const [loaded, setLoaded] = useState(false);
      const [editingTask, setEditingTask] = useState(null);

      // データ読み込み
      const loadData = () => {
        fetch(GAS_URL)
          .then(res => res.json())
          .then(resData => {
            const nObj = { A: "A", B: "B" };
            if (resData.names) resData.names.forEach(n => { if(n.id == 1) nObj.A = n.name; if(n.id == 2) nObj.B = n.name; });
            setData({ tasks: resData.tasks || [], logs: resData.logs || [], names: nObj });
            setLoaded(true);
          })
          .catch(err => { console.error(err); setLoaded(true); });
      };

      useEffect(() => { loadData(); }, []);

      // GAS送信中の表示は廃止してシンプルに
      const sendToGas = (action, payload) => {
        fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action, ...payload }) })
          .then(() => { if(action !== 'addLog') loadData(); });
      };

      // --- アクション ---
      const logTask = (taskId, person) => {
        const task = data.tasks.find(t => t.id == taskId);
        const newLog = { taskId, person, weight: Number(task.weight), time: Date.now() };
        
        // --- リアルタイム反映（楽観的更新） ---
        // サーバーからの返答を待たずに、手元のデータを即座に更新する
        setData(prev => ({
          ...prev,
          // ログリストの先頭に新しいログを追加
          logs: [newLog, ...prev.logs]
        }));
        
        // GASには裏で送信
        sendToGas("addLog", { target: "logs", data: newLog });
      };

      const saveNames = (names) => {
        setData(prev => ({...prev, names}));
        sendToGas("updateNames", { data: [{id: 1, name: names.A}, {id: 2, name: names.B}] });
      };

      const saveTask = (task) => {
        const action = task.id ? "updateTask" : "addTask";
        sendToGas(action, { data: task });
        setEditingTask(null);
      };

      const deleteTask = (taskId) => {
        if(window.confirm("この家事を削除しますか？")) {
          sendToGas("deleteTask", { id: taskId });
        }
      };

      // 計算
      const getPoints = (p) => data.logs.filter(l => l.person === p).reduce((s, l) => s + Number(l.weight), 0);
      const pA = getPoints("A"), pB = getPoints("B"), total = pA + pB, ratioA = total === 0 ? 50 : (pA / total) * 100;

      // ローディング画面
      if (!loaded) return <div className="loading-overlay">データ読み込み中...</div>;

      // タスク編集モーダル
      const TaskEditorModal = () => {
        const [curr, setCurr] = useState(editingTask);
        return (
          <div className="modal-overlay">
            <div className="modal-content">
              <div className="form-group"><label className="form-label">アイコン (絵文字を1つ入力)</label>
                <input type="text" className="emoji-input" value={curr.icon} onChange={e=>setCurr({...curr, icon: e.target.value.slice(0, 2)})} placeholder="🍳" /></div>
              <div className="form-group"><label className="form-label">家事の名前</label>
                <input type="text" className="form-input" value={curr.name} onChange={e=>setCurr({...curr, name: e.target.value})} placeholder="料理" /></div>
              <div className="form-group"><label className="form-label">ポイント</label>
                <input type="number" className="form-input" value={curr.weight} onChange={e=>setCurr({...curr, weight: e.target.value})} placeholder="3" /></div>
              <div style={{display:'flex', gap:'8px', marginTop:'15px'}}>
                <button className="btn" style={{flex:1, background:'#eee'}} onClick={()=>setEditingTask(null)}>キャンセル</button>
                <button className="btn" style={{flex:2, background:'#555', color:'white'}} onClick={()=>saveTask(curr)}>保存</button>
              </div>
            </div>
          </div>
        );
      };

      // --- 画面 ---
      
      // ホーム (スコア)
      const HomeTab = () => (
        <div className="main-content">
          <div className="score-container">
            <div className="card score-card a"><img src={pfps.A || 'https://via.placeholder.com/45'} className="score-pfp" />
              <div className="score-name" style={{color: 'var(--color-a)'}}>{data.names.A}</div>
              <div><span className="score-points">{pA}</span><span className="score-p">pt</span></div></div>
            <div className="card score-card b"><img src={pfps.B || 'https://via.placeholder.com/45'} className="score-pfp" />
              <div className="score-name" style={{color: 'var(--color-b)'}}>{data.names.B}</div>
              <div><span className="score-points">{pB}</span><span className="score-p">pt</span></div></div>
          </div>
          <div className="progress-container">
            <div className="progress-bar" style={{width: ratioA+"%", background: 'var(--color-a)'}}></div>
            <div className="progress-bar" style={{width: (100-ratioA)+"%", background: 'var(--color-b)'}}></div>
          </div>
          <div>
            {data.tasks.map(t => (
              <div key={t.id} className="card task-card">
                <div className="task-icon">{t.icon || '✨'}</div> {/* ここでアイコン(絵文字)を確実に表示 */}
                <div className="task-info"><div className="task-name">{t.name}</div><span className="task-weight">{t.weight}pt</span></div>
                <div className="task-btns">
                  <button className="btn btn-log a" onClick={()=>logTask(t.id, "A")}>{data.names.A.charAt(0)}</button>
                  <button className="btn btn-log b" onClick={()=>logTask(t.id, "B")}>{data.names.B.charAt(0)}</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      );

      // 設定画面
      const SettingsTab = () => {
        const [tempNames, setTempNames] = useState(data.names);
        const [tempPfps, setTempPfps] = useState(pfps);
        const saveAll = () => { saveNames(tempNames); localStorage.setItem("pfp_A", tempPfps.A); localStorage.setItem("pfp_B", tempPfps.B); setPfps(tempPfps); alert("保存しました"); };
        return (
          <div className="main-content">
            <div className="title">⚙️ 設定</div>
            <div className="card">
              <div className="settings-sub">登録者・画像</div>
              {[ {k:'A', c:'var(--color-a)'}, {k:'B', c:'var(--color-b)'} ].map(p => (
                <div key={p.k} style={{marginBottom:'10px'}}>
                  <div className="pfp-editor">
                    <img src={tempPfps[p.k] || 'https://via.placeholder.com/40'} className="pfp-preview" style={{borderColor:p.c}} />
                    <input type="text" className="form-input" style={{flex:1, fontWeight:'bold', color: p.c}} value={tempNames[p.k]} onChange={e=>setTempNames({...tempNames, [p.k]: e.target.value})} />
                  </div>
                  <div className="form-group">
                    <input type="text" className="form-input" value={tempPfps[p.k]} onChange={e=>setTempPfps({...tempPfps, [p.k]: e.target.value})} placeholder="画像URL (https://...)" /></div>
                </div>
              ))}
              <button className="btn" style={{width:'100%', background:'#555', color:'white', marginTop:'5px'}} onClick={saveAll}>名前と画像を保存</button>
            </div>
            <div className="card">
              <div className="settings-sub">家事の管理</div>
              {data.tasks.map(t => (
                <div key={t.id} className="task-edit-item">
                  <div className="task-edit-main" onClick={()=>setEditingTask(t)}>
                    <span style={{fontSize:'16px'}}>{t.icon || '✨'}</span><b>{t.name}</b><span>{t.weight}pt</span>
                  </div>
                  <button className="btn task-edit-del" onClick={()=>deleteTask(t.id)}>削除</button>
                </div>
              ))}
              <button className="btn" style={{width:'100%', background:'#eee', marginTop:'8px'}} onClick={()=>setEditingTask({icon:'', name:'', weight:''})}>＋ 家事を追加</button>
            </div>
          </div>
        );
      };

      return (
        <div style={{flex:1, display:'flex', flexDirection:'column'}}>
          {activeTab === "home" ? <HomeTab /> : <SettingsTab />}
          {editingTask && <TaskEditorModal />}
          <div className="nav-bar">
            <div className={`nav-item ${activeTab === "home" ? "active" : ""}`} onClick={()=>setActiveTab("home")}>
              <div className="nav-icon">{activeTab === "home" ? "🏠" : "🏡"}</div>HOME</div>
            <div className={`nav-item ${activeTab === "settings" ? "active" : ""}`} onClick={()=>setActiveTab("settings")}>
              <div className="nav-icon">{activeTab === "settings" ? "⚙️" : "⚙︎"}</div>設定</div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
